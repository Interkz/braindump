<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The Well{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">the well</a>
        <a href="/findings" class="nav-link">findings</a>
    </nav>
    {% block content %}{% endblock %}
    <!-- Confirm Dialog (reusable) -->
    <div class="confirm-backdrop" id="confirmDialog">
        <div class="confirm-card">
            <div class="confirm-message" id="confirmMessage"></div>
            <div class="confirm-actions">
                <button class="confirm-btn confirm-btn--cancel" id="confirmCancel">Cancel</button>
                <button class="confirm-btn confirm-btn--confirm" id="confirmOk">Confirm</button>
            </div>
        </div>
    </div>
    <script>
    const confirmDialog = (() => {
        const backdrop = document.getElementById('confirmDialog');
        const msgEl = document.getElementById('confirmMessage');
        const cancelBtn = document.getElementById('confirmCancel');
        const okBtn = document.getElementById('confirmOk');
        let onConfirm = null;

        function close() {
            backdrop.classList.remove('open');
            onConfirm = null;
        }

        function show({ message, onConfirm: cb }) {
            msgEl.textContent = message;
            onConfirm = cb;
            backdrop.classList.add('open');
            cancelBtn.focus();
        }

        cancelBtn.addEventListener('click', close);

        okBtn.addEventListener('click', () => {
            if (onConfirm) onConfirm();
            close();
        });

        backdrop.addEventListener('click', (e) => {
            if (e.target === backdrop) close();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && backdrop.classList.contains('open')) close();
        });

        return { show, close };
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
