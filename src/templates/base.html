<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The Well{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">the well</a>
        <div style="display:flex;align-items:center;gap:0">
            <a href="/findings" class="nav-link">findings</a>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
        </div>
    </nav>
    <script>
        (function() {
            var btn = document.getElementById('theme-toggle');
            var theme = localStorage.getItem('theme') || 'dark';

            function apply(t) {
                if (t === 'paper') {
                    document.body.setAttribute('data-theme', 'paper');
                } else {
                    document.body.removeAttribute('data-theme');
                }
                btn.textContent = t === 'paper' ? '\u263D' : '\u2600';
            }

            apply(theme);

            btn.addEventListener('click', function() {
                theme = theme === 'dark' ? 'paper' : 'dark';
                localStorage.setItem('theme', theme);
                apply(theme);
            });
        })();
    </script>
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
