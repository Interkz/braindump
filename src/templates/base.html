<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The Well{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">the well</a>
        <a href="/findings" class="nav-link">findings</a>
    </nav>
    {% block content %}{% endblock %}

    <!-- Quick Capture Overlay (Ctrl+Shift+D) -->
    <div class="quick-capture-overlay" id="quickCapture">
        <div class="quick-capture-box">
            <input type="text" class="quick-capture-input" id="quickCaptureInput"
                   placeholder="quick drop..." autocomplete="off">
            <div class="quick-capture-hint">enter to drop &middot; esc to close</div>
        </div>
    </div>
    <div class="quick-capture-flash" id="quickCaptureFlash">dropped</div>

    <script>
    (function() {
        const overlay = document.getElementById('quickCapture');
        const input = document.getElementById('quickCaptureInput');
        const flash = document.getElementById('quickCaptureFlash');

        function open() {
            overlay.classList.add('active');
            input.value = '';
            input.focus();
        }

        function close() {
            overlay.classList.remove('active');
        }

        function showFlash() {
            flash.classList.add('visible');
            setTimeout(() => flash.classList.remove('visible'), 1200);
        }

        // Global shortcut: Ctrl+Shift+D
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'D') {
                e.preventDefault();
                if (overlay.classList.contains('active')) {
                    close();
                } else {
                    open();
                }
            }
        });

        // Close on Escape
        input.addEventListener('keydown', async (e) => {
            if (e.key === 'Escape') {
                close();
                return;
            }
            if (e.key === 'Enter') {
                e.preventDefault();
                const content = input.value.trim();
                if (!content) return;
                close();
                try {
                    const resp = await fetch('/api/drop', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content }),
                    });
                    if (resp.ok) showFlash();
                } catch (err) {
                    console.error('Quick capture error:', err);
                }
            }
        });

        // Close on clicking backdrop
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) close();
        });
    })();
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
