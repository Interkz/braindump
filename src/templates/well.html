{% extends "base.html" %}

{% block content %}
<div class="well-container">
    <div class="drop-zone">
        <input
            type="text"
            class="drop-input"
            placeholder="drop something in..."
            autocomplete="off"
            autofocus
        >
        <div class="drop-hint">press enter — it falls into the well</div>
        <div class="shortcut-hints">
            <span class="shortcut-hint"><kbd>/</kbd> focus</span>
            <span class="shortcut-hint"><kbd>Esc</kbd> clear</span>
            <span class="shortcut-hint"><kbd>Tab</kbd> findings</span>
        </div>
    </div>
    <div class="the-void"></div>
    <div class="drop-counter"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/well.js"></script>
{% endblock %}
