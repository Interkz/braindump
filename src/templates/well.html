{% extends "base.html" %}

{% block content %}
<div class="well-container">
    <div class="drop-zone">
        <textarea
            class="drop-input"
            placeholder="drop something in..."
            autocomplete="off"
            autofocus
            rows="1"
        ></textarea>
        <div class="drop-hint">enter to drop — shift+enter for new line</div>
    </div>
    <div class="the-void"></div>
    <div class="drop-counter"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/well.js"></script>
{% endblock %}
