{% extends "base.html" %}

{% block content %}
<div class="well-container">
    <div class="drop-zone">
        <input
            type="text"
            class="drop-input"
            placeholder="drop something in..."
            autocomplete="off"
            autofocus
        >
        <div class="drop-hint">press enter — it falls into the well</div>
    </div>
    <div class="the-void"></div>
    <div class="drop-counter"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/well.js"></script>
{% endblock %}
